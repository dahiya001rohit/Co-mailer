<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Newton School of Technology</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f4f4f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    .email-wrapper {
      width: 100%;
      background-color: #f4f4f5;
      padding: 40px 20px;
    }
    .email-container {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    .header {
      background-color: black;
      padding: 32px 40px;
      text-align: center;
    }
    .logo {
      height: 48px;
      margin-bottom: 8px;
    }
    .header-text {
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.5px;
      margin: 0;
    }
    
    /*Add content styles here*/
    
    .divider {
      height: 1px;
      background-color: #e4e4e7;
      margin: 0 40px;
    }
    .footer {
      background-color: #18181b;
      padding: 32px 40px;
      text-align: center;
    }
    .footer-logo {
      height: 36px;
      margin-bottom: 20px;
    }
    .social-links {
      margin-bottom: 24px;
    }
    .social-icon {
      display: inline-block;
      width: 40px;
      height: 40px;
      margin: 0 8px;
      background-color: #27272a;
      border-radius: 50%;
      line-height: 40px;
      text-align: center;
    }
    .social-icon img {
      width: 20px;
      height: 20px;
      vertical-align: middle;
    }
    .footer-text {
      color: #a1a1aa;
      font-size: 13px;
      line-height: 1.6;
      margin: 0 0 8px 0;
    }
    .footer-link {
      color: #007AFF;
      text-decoration: none;
    }
    .unsubscribe {
      color: #71717a;
      font-size: 12px;
      margin-top: 16px;
    }
    .unsubscribe a {
      color: #71717a;
      text-decoration: underline;
    }
    @media only screen and (max-width: 600px) {
      .email-wrapper { padding: 20px 10px; }
      .header, .content, .footer { padding: 24px 20px; }
      .headline { font-size: 24px; }
      .divider { margin: 0 20px; }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">
    <div class="email-container">
      <!-- Header -->
      <div class="header">
        <img src="https://cdn.prod.website-files.com/62e8d2ea218fb7676b6892a6/6839ca1d6dc27d66f04b3645_NewtonSchool%20Logo.png" alt="Newton School Logo" class="logo">
        <p class="header-text">Newton School of Technology</p>
      </div>

      <!-- Main Content -->
      <!--Add content here-->

      <div class="divider"></div>

      <!-- Footer -->
      <div class="footer">
        <img src="https://cdn.prod.website-files.com/62e8d2ea218fb7676b6892a6/6839ca1d6dc27d66f04b3645_NewtonSchool%20Logo.png" alt="Newton School" class="footer-logo">
        
        <!-- Social Links -->
        <div class="social-links">
          <a href="https://www.instagram.com/newtonschooltech/" class="social-icon" style="text-decoration: none;">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
          </a>
          <a href="https://www.linkedin.com/school/newton-school-of-technology/" class="social-icon" style="text-decoration: none;">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">
          </a>
          <a href="https://www.youtube.com/@NewtonSchool" class="social-icon" style="text-decoration: none;">
            <img src="https://cdn-icons-png.flaticon.com/512/174/174883.png" alt="YouTube">
          </a>
          <a href="https://wa.me/919876543210" class="social-icon" style="text-decoration: none;">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
          </a>
        </div>

        <p class="footer-text">
          Newton School of Technology<br>
          Industry-Aligned, Advanced Curriculum
        </p>
        <p class="footer-text">
          <a href="mailto:support.nst@newtonschool.co" class="footer-link">support.nst@newtonschool.co</a>
        </p>
        <p class="footer-text">
          <a href="https://www.newtonschool.co/newton-school-of-technology-nst/home" class="footer-link">Visit our website</a>
        </p>
        
        <p class="unsubscribe">
          <a href="#">Unsubscribe</a> | <a href="#">Privacy Policy</a> | <a href="#">Terms and Conditions</a>
        </p>
      </div>
    </div>
  </div>
</body>
</html>
